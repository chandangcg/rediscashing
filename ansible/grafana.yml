---
- name: Install Prometheus and Grafana
  hosts: monitor
  become: yes

  tasks:

  - name: Update apt packages
    apt:
      update_cache: yes

  - name: Install dependencies
    apt:
      name:
        - apt-transport-https
        - software-properties-common
        - wget
      state: present

  - name: Download Prometheus
    get_url:
      url: https://github.com/prometheus/prometheus/releases/latest/download/prometheus-2.52.0.linux-amd64.tar.gz
      dest: /tmp/prometheus.tar.gz

  - name: Extract Prometheus
    unarchive:
      src: /tmp/prometheus.tar.gz
      dest: /opt/
      remote_src: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  - name: Start Grafana service
    service:
      name: grafana-server
      state: started
      enabled: yes
